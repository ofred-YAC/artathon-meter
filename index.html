
<style>
    
    :root {
        --main-padding: 15px;
        --timelineSize: 400px;
        --circleSize: 15px;
        --artathonLoc: 35%;
        --lineWidth: 25px;
        --backgroundColor: #f2f7ff;
        --textColor: #354395;
        --timelineValue: 0%;
        --timelineColor: rgb(214, 105, 16);

        --chickenMeter: rgb(255, 213, 3);
        --chickenMeterValue: 0%;
    }
    @font-face {
        font-family: 'granville';
        src: url('./granville.otf')  format('truetype');
    }
    #everything{
        display: flex;
        justify-content: center;
        align-items: center;
        
        padding: 0;
        font-family: 'granville';
        font-style:normal;
        font-weight: 400; /* normal */
        font-synthesis: none;
        box-sizing: border-box; margin: 0; padding: 0;
    }
    #container{
        width: 100%;
        max-width: 1200px;
        min-height: 100px;
        
        display: flex;
        flex-direction: row;
        
    }
    .box{
        background-color: var(--backgroundColor);
        width: 100%;
        margin-bottom: var(--main-padding);
        border-radius: 25px;
        padding: var(--main-padding);
        border-style: solid;
        border-width: 1px;
        border-color: rgb(63, 63, 155);
        filter: drop-shadow(0px 5px 0px #00226009);
        
    }
    #topBox{
       aspect-ratio: 1/1;
    }
    
    #top{
        display: flex;
        background-color: var(--backgroundColor);
        margin-top: 15px;
        width: 100%;
        flex-direction:row;
        aspect-ratio: 12.4/10;
    }
    #bottom{
        background-color: var(--backgroundColor);
        width: 100%;
        margin-top: var(--main-padding);
        display: flex;
        flex-direction: row;
        align-items: center;
    }
    #chickenContainer{
        width: 35%;
        
        background-color: var(--backgroundColor);
        margin-right: var(--main-padding);
        position: relative;
    }
    #timelineContainer{
        width: 65%;
        
        background-color: var(--backgroundColor);
        display: flex;
        flex-direction: row;
        
    }
    #timelineMeter{
        height: 100%;
        width: 12px;
        background-color: var(--timelineColor);
        border-style: solid;
        border-width: 1px;
        border-radius: 15px;
        border-color: var(--timelineColor);
        opacity:70%;
    }
    #timelineMeterFill{
        height: calc(100% - var(--timelineValue));
        background-color: rgb(255, 255, 255);
        width: 100%;
    }
    #timelineText{
        height: 100%;
        position: relative;
        width: 100%;
    }
    .eventBox{
        
        position: absolute;
        margin-left: 35px;
        align-items: center;
        transform:translateY(-15px)
    }
    #artathon_eb{
        top: var(--artathonLoc);
    }
    #summer_eb{
        top: 0%
    }
    #start_eb{
        top: 100%
    }
    #circles{
        height: 100%;
        position: relative;
    }
    .circle{
        background-color: white;
        border-radius: 50%;
        width: var(--circleSize);
        height: var(--circleSize);
        margin: 0;
        border-style: solid;
        border-width: 1px;
        border-color: var(--timelineColor);
        position: absolute;
        transform: translateY(-7px) translateX(-13px);
        z-index: 25;
    }
    #artathon_c{
        top: var(--artathonLoc)
        
    }
    #start_c{
       top:99%
    }
    .circle.passed{
        background-color: var(--timelineColor);
    }
    .circle.en{
        border-width: 2px;
    }
    #lines{
        height: 100%;
        position: relative;
    }
    .circleLine{
        width: var(--lineWidth);
        height: 1px;
        background-color: var(--timelineColor);
        position: absolute;
        transform: translateX(-5px)
    }
    .circleLine.en{
        height: 2px;
    }
    #artathon_cl{
        top: var(--artathonLoc)
    }

    #start_cl{
       top: 99%
    }
    
    #currentAmount{
        display: flex;
        flex-direction: row;
        height: 100%;
        padding: 25px;
        align-items: center;
        min-width: 60%;
        font-size: 1.6rem;
        text-align: right;
    }
    h3{
       margin: 7px;
        font-size: 120%;
    }
    h4{
        font-size: 90%;
        opacity: 90%;
    }
    a{
        width: 100%;
        height: 100%;
    } 
    #donateButton{
        
        width: 100%;
        max-width: 220px;
        font-family: granville;
        font-size: 2rem;
        border-style: solid;
        color: white;
        background-color: #814B79;
        border-color: rgb(0, 0, 0);
        border-radius: 25px;
        border-width: 2px;
        cursor: pointer;
        filter: drop-shadow(0px 5px 0px #0022603f);
        height: 65px
    }
    #donateButton:hover{
        transform: translateY(2px);
        filter: drop-shadow(0px 3px 0px #0022603f);
        
    }
    #donateButton:active{
        transform: translateY(5px);
        filter: drop-shadow(0px 0px 0px #0022603f)
    }
    
    #chicken {
        background-image: url(./chicken_blinking.png);
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: repeat-x;
        position: absolute;
        background-position: bottom;
        z-index: 1; /* always below */
    }

    #chickenOpen {
        background-image: url(./chicken.png);
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: repeat-x;
        position: absolute;
        background-position: bottom;
        z-index: 2; /* always on top */
       
    }
    
    #chickenMeter {
        height: 0%;
    }
    
    .eventText.disabled{
        color: #7a82b5;
        font-size: 1.2rem;
    }
    .eventText.enabled{
        font-size: 1.6rem;
        color: #354395
    }
    .goal{
        font-size:80%;
        opacity: 95%;
    }
    #chickenMeter{
        position: absolute;
        height: 95%;
        width: 95%;
        background-color: var(--chickenMeter);
        border-radius: 15px;
        margin: 0px;
        padding: -4px;
        transform: translate(2px, 2px);
    }
    
    #chickenMeterFill{
        height: calc(100% - var(--chickenMeterValue));
        background-color: rgb(255, 255, 255);
        
        border-color: rgba(207, 100, 0, 0.403);
        border-style: solid;
        width: 100%;
        border-top: 1px;
        z-index: 25;
       
    }
    #circleDisplay{
        width:20px;
        height:20px;
        background-color: var(--chickenMeter);
        border-color: rgba(0, 0, 0, 0.235);
        border-style: solid;
        border-width: 1px;
        border-radius: 50%;
        aspect-ratio: 1;
        
    }
    #timeLeft{
        font-size: 70%;
        opacity: 70%;
    }
    #bottomBox{    
        min-height: 50px;
        display: flex;
        flex-direction: column;
        max-width:200px;
        margin-left: 10px;
    }
    .donationBox{
        display: flex;
        flex-direction: column;
        font-size: 1.3rem;
        color: var(--textColor);
        height:33.33333%;
        padding: 10px;
        border-style: dashed;
        border-width: 1px;
        border-color: rgba(77, 61, 255, 0.264);
        border-radius: 15px;
        margin: 5px;
        background-color: rgba(255, 255, 255, 0.446);
    }
    p1{
        opacity: 80%;
    }
    p2{
        font-size: 90%;
        opacity: 100%;
    }
    p3{
        font-size: 70%;
        opacity: 70%;
    }
    @media (max-width: 900px) {
        #bottomBox{
            max-width: none;
            flex-direction: row;
            max-width: none;
            margin-left: 0;
            
        }
        #container{
            flex-direction: column;
            width: 100%;
            margin-right: 8%;
        }
        .donationBox{
            height: auto;
            width: 33.33333%;
        }
        
    }
    @media (max-width: 600px) {
        #donateButton{
            font-size: 1.2rem
        }
        #currentAmount{
            font-size: 1.2rem;
            min-width: 60%;
            padding: 5px
        }
        #timelineText{
            font-size: 1rem;
        }
        .donationBox{
            font-size: smaller;
        }
        .event{
            font-size: smaller;
        }
        .goal{
            font-size: smaller;
        }
        #circleDisplay{
            width: 8%;
            height: 8%;
        }
        #chickenMeterFill{
            border-style: none;
        }
    }
</style>

<div id="everything">
    <div id="container">
        <div id="topBox" class ="box">
            <div id="top">
                
                <div id="chickenContainer">
                    <div id="chickenMeter">
                        <div id="chickenMeterFill"></div>
                    </div>
                    <div id="chicken"></div>
                    <div id="chickenOpen"></div>
                </div>
                
                <div id="timelineContainer">
                    <div id="timelineMeter">
                        <div id="timelineMeterFill"></div>
                    </div>
                    
                    <div id="circles">
                        <div id="summer_c" class= "circle"></div>
                        <div id="artathon_c" class ="circle"></div>
                        <div id="start_c" class ="circle passed"></div>
                    </div>
                    
                    <div id="lines">
                        <div id="summer_cl" class="circleLine"></div>
                        <div id="artathon_cl" class="circleLine"></div>
                        <div id="start_cl" class="circleLine"></div>
                    </div>

                    <div id="timelineText">
                        <div id="summer_eb" class ="eventBox">
                            <div id="summer_et" class ="eventText">
                                <div id="summer_e" class="event">Summer Fundraiser (7/24)</div>
                                <div id="summer_g" class="goal">Goal: $12,000</div>
                            </div>
                            
                        </div>
                        <div id="artathon_eb" class="eventBox">
                            <div id="artathon_et" class ="eventText">
                                <div id="artathon_e" class="event">ARTathon (6/21)</div>
                                
                                <div id="artathon_g" class="goal">Goal: $4,000</div>
                            </div>
                        </div>
                        <div id="start_eb" class="eventBox">
                            <div id="start_et" class ="eventText disabled">
                                <div id="event">Start(5/15)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="bottom">
                <div id="currentAmount">
                    <h4>We're at: </h4><h3 id="currentDonationAmount">$0</h3><div id="circleDisplay"></div>
                </div>
                <a target="_blank" href="https://wl.donorperfect.net/weblink/WebLink.aspx?name=E362504&id=3">
                    <button id="donateButton">Donate!</button>
                </a>
            </div>
        </div>
        <div id="bottomBox" class ="box">
            <div id="donation1" class = "donationBox">
                <p1 id="donation1Name">Name</p1>
                <p2 id="donation1Amount">$0</p2>
                <p3 id="donation1Time">Time</p3>
            </div>
            <div id="donation1" class = "donationBox">
                <p1 id="donation2Name">Name</p1>
                <p2 id="donation2Amount">$0</p2>
                <p3 id="donation2Time">Time</p3>
            </div>
            <div id="donation1" class = "donationBox">
                <p1 id="donation3Name">Name</p1>
                <p2 id="donation3Amount">$0</p2>
                <p3 id="donation3Time">Time</p3>
            </div>
        </div>
    </div>

    <script>

    const NETLIFY_URL = 'https://artathon-meter.netlify.app/.netlify/functions/donations';

    let donated = 0;
    var donationAnim = 1;
    const artathonGoal = 10000;
    const goal = 20000;

    const currentDate = new Date();
    const startDate = new Date("2026-05-15");
    const artathonDate = new Date("2026-06-21");
    const summershowDate = new Date("2026-07-24");

    if (currentDate < startDate) currentDate.setTime(startDate.getTime());
    if (currentDate > summershowDate) currentDate.setTime(summershowDate.getTime());

    function animateDonation(current, target) {
    if (current < target) {
        var speed = 50;
        current += speed;
        if (current > target) current = target;
        var meter = (11 + (current / goal) * 83).toFixed(1) + "%";
        if (target <= speed) meter = "0%";
        document.getElementById("currentDonationAmount").textContent = "$" + current.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        document.documentElement.style.setProperty('--chickenMeterValue', meter);
        setTimeout(() => animateDonation(current, target), 4);
    }
    }
    const preloadAfter = document.createElement('div');
    preloadAfter.style.cssText = 'position:absolute;width:0;height:0;background-image:url(./chicken.png);visibility:hidden;';
    document.body.appendChild(preloadAfter);


    async function fetchDonations() {
    try {
        const res = await fetch(NETLIFY_URL);
        const data = await res.json();
        donated = Math.round((data.total || 0) - 4650675);
        document.getElementById("donation1Name").textContent = data.recent[0]?.name ?? "Anonymous";
        document.getElementById("donation1Amount").textContent = "$" + (data.recent[0]?.amount ?? 0).toLocaleString();
        document.getElementById("donation1Time").textContent = data.recent[0]?.daysAgo === 0 ? "today" : (data.recent[0]?.daysAgo ?? "?") + " days ago";

        document.getElementById("donation2Name").textContent = data.recent[1]?.name ?? "Anonymous";
        document.getElementById("donation2Amount").textContent = "$" + (data.recent[1]?.amount ?? 0).toLocaleString();
        document.getElementById("donation2Time").textContent = data.recent[1]?.daysAgo === 0 ? "today" : (data.recent[1]?.daysAgo ?? "?") + " days ago";

        document.getElementById("donation3Name").textContent = data.recent[2]?.name ?? "Anonymous";
        document.getElementById("donation3Amount").textContent = "$" + (data.recent[2]?.amount ?? 0).toLocaleString();
        document.getElementById("donation3Time").textContent = data.recent[2]?.daysAgo === 0 ? "today" : (data.recent[2]?.daysAgo ?? "?") + " days ago";

    } catch (err) {
        console.error("Could not fetch donations:", err);
        donated = 0;
    }
    animateDonation(donationAnim, donated);
    }

// --- your existing timeline/goals code stays here unchanged ---

// Call at the end, after everything is defined
        fetchDonations();
        let canBlink = true;
        const chickenOpen = document.getElementById('chickenOpen');
        function chickenBlink() {
            chickenOpen.style.opacity = '0.001';
            if (Math.random() < 0.93 && canBlink) {
                chickenOpen.style.opacity = '1';
            }
            setTimeout(chickenBlink, 100);
            canBlink = true;
        }
        function preloadImages(urls) {
            return Promise.all(
                urls.map(
                    (url) =>
                        new Promise((resolve, reject) => {
                            const img = new Image();
                            img.onload = resolve;
                            img.onerror = reject;
                            img.src = url;
                        })
                )
            );
        }
        preloadImages(["./chicken.png", "./chicken_blinking.png"]).then(() => {
           setTimeout(chickenBlink, 150);
        });
        
        //set goal
        document.getElementById("artathon_g").textContent = "Goal: $" + artathonGoal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        document.getElementById("summer_g").textContent = "Goal: $" + goal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        //math
        const totalDays = (summershowDate - startDate) / (24*60*60*1000);
        const daysPassed = (currentDate - startDate) / (24*60*60*1000);

        //const timelinePercent = ((daysPassed / totalDays)*100).toFixed(1)
        const artathonDays = (artathonDate - startDate) / (24*60*60*1000);
        const artathonPercent = (100-((artathonDays / totalDays)*100)).toFixed(1) + "%"
        
        //map range
        function map_range(value, low1, high1, low2, high2) {
            return low2 + (high2 - low2) * (value - low1) / (high1 - low1);
        }

        var timelinePercent
        var percentFirstHalf = map_range(daysPassed, 0, artathonDays, 0, 50)
        var percentSecondHalf = map_range(daysPassed, artathonDays, totalDays, 50, 100)
       
        
        const timeLeftDiv = document.createElement("div");
        timeLeftDiv.id = "timeLeft";
        
        function timeLeftAmount(days) {
           if (parseInt(days / 30) >= 1){
            var months = parseInt(days/30)
            if (months > 1){
                return months + " months left!"
            }
            else{
                return months + " month left!"
            }
           }
           else{
            return days + " days left!"
           }
        }

        const circleDiv = document.createElement("div")
        circleDiv.id = "circleDisplay"

        if (daysPassed <= artathonDays){
            timeLeftDiv.textContent = timeLeftAmount(artathonDays - daysPassed)
            document.getElementById("artathon_e").appendChild(timeLeftDiv)
            timelinePercent = percentFirstHalf + "%";
            document.getElementById("artathon_et").classList.add("enabled");
            document.getElementById("summer_et").classList.add("disabled");
            document.getElementById("artathon_cl").classList.add("en")
            document.getElementById("artathon_c").classList.add("en")
        }
            
        else{
            timeLeftDiv.textContent = timeLeftAmount(totalDays-daysPassed)
            document.getElementById("summer_e").appendChild(timeLeftDiv)
            timelinePercent = percentSecondHalf + "%";
            document.getElementById("summer_et").classList.add("enabled");
            document.getElementById("artathon_et").classList.add("disabled");
            document.getElementById("summer_c").classList.add("en");
            document.getElementById("summer_cl").classList.add("en")
        }
        //set timeline meter
        document.documentElement.style.setProperty('--timelineValue', timelinePercent);
        document.documentElement.style.setProperty('--artathonLoc', "50%")

        //fill circles if event passed
        if (currentDate >= artathonDate) document.getElementById("artathon_c").classList.add("passed");
        function hideBottom(){
            document.getElementById("bottomBox").remove()
        }
        window.addEventListener("message", (event) => {
            if (event.data === "hideBottom") {
                hideBottom(); 
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.9/iframeResizer.contentWindow.min.js"></script>
</div>
